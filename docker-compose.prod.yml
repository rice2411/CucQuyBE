# BE production trên VPS — KÉO image dựng sẵn từ GHCR (không build tại chỗ).
# Chỉ bind 127.0.0.1:3000 → nginx host reverse-proxy ra ngoài (HTTPS).
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Cần cùng thư mục: .env (điền đủ secret) + service_account.json

name: cucquy

services:
  backend:
    image: ghcr.io/cucquy/cucquy-backend:latest
    pull_policy: always
    container_name: cucquy-backend
    env_file:
      - .env
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # service_account.json đọc lúc chạy, KHÔNG nằm trong image
      - ./service_account.json:/app/service_account.json:ro
    restart: unless-stopped
