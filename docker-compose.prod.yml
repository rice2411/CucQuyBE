# BE production trên VPS — KÉO image dựng sẵn từ GHCR (không build tại chỗ).
# Chỉ bind 127.0.0.1:3000 → nginx host reverse-proxy ra ngoài (HTTPS).
# Redis chạy cùng (cache role/reference/report), chỉ trong mạng nội bộ compose.
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Cần cùng thư mục: .env (điền đủ secret) + service_account.json

name: cucquy

services:
  redis:
    image: redis:alpine
    container_name: cucquy-redis
    # noeviction (KHÔNG allkeys-lru) vì Redis còn lưu job BullMQ — evict job sẽ
    # hỏng queue. Cache của ta có TTL nên tự dọn; 128MB dư cho cache + queue.
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction
    restart: unless-stopped

  backend:
    image: ghcr.io/cucquy/cucquy-backend:latest
    pull_policy: always
    container_name: cucquy-backend
    env_file:
      - .env
    environment:
      # BE nối Redis qua tên service trong mạng compose (không lộ ra ngoài).
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # service_account.json đọc lúc chạy, KHÔNG nằm trong image
      - ./service_account.json:/app/service_account.json:ro
    restart: unless-stopped
